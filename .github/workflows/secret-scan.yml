# Secret scanning com gitleaks. É o único check de CI ativado por enquanto
# (lint/testes ficam para depois — este repo é de estudos). Roda em push e PR.
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Permissão mínima: o job só precisa ler o conteúdo.
permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # histórico completo, não só o último commit
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Nota: para repositório de ORGANIZAÇÃO ainda PRIVADO, a action pede um
          # GITLEAKS_LICENSE (gratuito, em gitleaks.io). Quando o repo virar PÚBLICO,
          # não é necessário. Alternativa: ativar o "Secret scanning + push protection"
          # nativo do GitHub (Settings → Code security), grátis em repositórios públicos.
