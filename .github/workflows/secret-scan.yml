# Secret scanning com o BINÁRIO do gitleaks (MIT, open source) — sem depender da
# gitleaks-action, que exige licença paga/gratuita para repositórios de ORGANIZAÇÃO.
# Rodar o binário direto não tem essa exigência e é totalmente reprodutível.
#
# Único check de CI ativado por enquanto (lint/testes ficam para depois — repo de estudos).
name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Permissão mínima: o job só lê o conteúdo.
permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"   # bump aqui quando quiser atualizar

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      # checkout@v5 roda em Node 24 (Node 20 está sendo descontinuado nos runners).
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0          # histórico completo, não só o último commit

      - name: Instalar gitleaks (binário)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Escanear histórico
        run: gitleaks git . --no-banner --redact --verbose
