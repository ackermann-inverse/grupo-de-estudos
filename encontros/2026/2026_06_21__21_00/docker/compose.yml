# Stack local em containers: Ollama, aplicação e Phoenix. Prefira os targets
# docker-* do Makefile para não precisar conhecer os detalhes do Compose.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      GEN_MODEL: ${GEN_MODEL:-llama3.2:1b}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      USE_MOCK: ${USE_MOCK:-0}
      PHOENIX_PROJECT: ${PHOENIX_PROJECT:-context-rag-pocs}
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006/v1/traces

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix:/mnt/data

volumes:
  ollama:
  phoenix:
